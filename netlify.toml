[build]
  command = "npm run build"
  publish = "dist"

[functions]
  directory = "api"
  node_bundler = "esbuild"

# ── Dynamic student-menu item: passes the path segment as ?id= ──────────────
[[redirects]]
  from = "/api/admin/student-menu/:id"
  to = "/.netlify/functions/admin/student-menu/item?id=:id"
  status = 200

# ── Index-style routes (file is named index.ts; map without the /index suffix) ──
[[redirects]]
  from = "/api/meals"
  to = "/.netlify/functions/meals/index"
  status = 200

[[redirects]]
  from = "/api/bookings"
  to = "/.netlify/functions/bookings/index"
  status = 200

[[redirects]]
  from = "/api/notifications"
  to = "/.netlify/functions/notifications/index"
  status = 200

[[redirects]]
  from = "/api/admin/guest-meals"
  to = "/.netlify/functions/admin/guest-meals/index"
  status = 200

[[redirects]]
  from = "/api/admin/routines"
  to = "/.netlify/functions/admin/routines/index"
  status = 200

[[redirects]]
  from = "/api/admin/student-menu"
  to = "/.netlify/functions/admin/student-menu/index"
  status = 200

# ── Student routes ───────────────────────────────────────────────────────────
[[redirects]]
  from = "/api/student/menu"
  to = "/.netlify/functions/student/menu"
  status = 200

[[redirects]]
  from = "/api/student/orders/list"
  to = "/.netlify/functions/student/orders/list"
  status = 200

[[redirects]]
  from = "/api/student/orders/create"
  to = "/.netlify/functions/student/orders/create"
  status = 200

[[redirects]]
  from = "/api/admin/users/delete"
  to = "/.netlify/functions/admin/users/delete"
  status = 200

[[redirects]]
  from = "/api/admin/users/balance"
  to = "/.netlify/functions/admin/users/balance"
  status = 200

# ── General API wildcard ──────────────────────────────────────────────────────
[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200

# ── SPA fallback ──────────────────────────────────────────────────────────────
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
